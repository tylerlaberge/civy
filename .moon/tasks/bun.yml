# https://moonrepo.dev/docs/config/tasks
# Shared task definitions inherited by every Bun project in the workspace.
# Individual projects may override or extend these in their own moon.yml.
$schema: "https://moonrepo.dev/schemas/tasks.json"

# File groups the shared tasks glob over; projects may override per their layout.
fileGroups:
  sources:
    - "src/**/*"
  tests:
    - "tests/**/*"
    - "src/**/*.{test,spec}.{ts,tsx}"

tasks:
  # Biome handles both linting and format-checking in one pass.
  lint:
    command: "biome check ."
    inputs:
      - "@globs(sources)"
      - "@globs(tests)"
      - "package.json"
      - "tsconfig.json"
      - "/biome.json"

  typecheck:
    command: "tsc --noEmit"
    inputs:
      - "@globs(sources)"
      - "@globs(tests)"
      - "tsconfig.json"
      - "/tsconfig.base.json"

  test:
    command: "vitest run"
    inputs:
      - "@globs(sources)"
      - "@globs(tests)"

  # App projects override this (e.g. `astro build`, `nest build`); the default
  # emits compiled TypeScript into dist/ for library packages.
  build:
    command: "tsc --outDir dist"
    inputs:
      - "@globs(sources)"
      - "tsconfig.json"
      - "/tsconfig.base.json"
    outputs:
      - "dist"

  # Named `dev`, so moon infers the persistent `server` preset (local, uncached).
  dev:
    command: "echo 'No dev task configured for this project'"
