# https://moonrepo.dev/docs/config/toolchain
$schema: "https://moonrepo.dev/schemas/toolchain.json"

# moon owns task running; bun owns dependency linking (and is the runtime).
# Tool versions are pinned in .prototools (the single source of truth).
bun:
  # Keep bun workspace deps in sync with each project's package.json.
  syncProjectWorkspaceDependencies: true
