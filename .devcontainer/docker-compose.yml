# Local dev stack: the Claude sandbox plus a Redis sibling (the ingestion worker's BullMQ backend).
# Both sit on compose's default network, so the sandbox reaches redis by service name — and
# init-firewall.sh carves that subnet out of its private-range blocks. No ports are published to the
# host: redis is only needed from inside the network, and the web/api dev servers are reached via
# devcontainer.json's forwardPorts, not compose.
#
# Host binds that need a mechanism devcontainer.json lacks live here (see the volumes note below):
# the read-only ones (devcontainer.json drops `readonly` in compose mode) and the memory bind (whose
# path needs an interpolated key). The rest of the read-write mounts and env stay in devcontainer.json.
name: civy

services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    image: civy-claude-sandbox:latest
    # NET_ADMIN/NET_RAW let init-firewall.sh manage iptables.
    cap_add:
      - NET_ADMIN
      - NET_RAW
    command: sleep infinity
    # Wait for redis to pass its healthcheck so the worker's fail-fast boot connect doesn't race it.
    depends_on:
      redis:
        condition: service_healthy
    # Host binds that devcontainer.json can't express correctly live here; keep these targets OUT of
    # devcontainer.json (compose merges service volumes by target, so a duplicate there would win).
    #
    # READ-ONLY binds: in compose mode the devcontainer CLI rewrites `mounts` into short-syntax
    # compose volumes and DROPS the `readonly` flag, so a `type=bind,readonly` mount silently comes
    # up writable — the agent could then edit host skills or the gh token. Compose honors `:ro`.
    #
    # MEMORY bind (read/write): its host path embeds ${CLAUDE_PROJECT_KEY}, computed per clone path
    # by init-host-env.sh (via initializeCommand) and delivered through the generated .devcontainer/
    # .env, which compose loads from the dir of the first `-f` file. Both source and target use the
    # key: the source is the host's real memory dir, the target matches the container workspace so
    # Claude's memory key resolves. RW so new memories sync back to the host.
    volumes:
      # Host skills, so sandboxed Claude matches host behavior — read-only.
      - ${HOME}/.claude/skills:/home/dev/.claude/skills:ro
      # To also share global user instructions, create ~/.claude/CLAUDE.md then uncomment:
      #   - ${HOME}/.claude/CLAUDE.md:/home/dev/.claude/CLAUDE.md:ro
      # GitHub push token dir (see README "Enable git push") — read-only.
      - ${HOME}/.config/civy:/home/dev/.config/civy:ro
      # This repo's project memory — read/write. Key is generated; see the note above.
      - ${HOME}/.claude/projects/${CLAUDE_PROJECT_KEY}/memory:/home/dev/.claude/projects/${CLAUDE_PROJECT_KEY}/memory

  # BullMQ's Redis backend for the ingestion worker. Pinned to a minor tag (alpine) for a small,
  # reproducible-enough image. Reachable only on the compose network as `redis:6379`.
  redis:
    image: redis:7-alpine
    # Durable enough for local dev without RDB snapshot churn; the queue is rebuildable anyway.
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - civy-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  civy-redis-data:
